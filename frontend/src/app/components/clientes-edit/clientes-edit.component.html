<nav class="navbar navbar-dark bg-dark">
    <a href="/" class="navbar-brand">CLIENTES</a>
</nav>

<div class="row mt-5">
    <div class="card">
        <div class="card-body">
            <form action="">
                <!-- Primary Key (ÚNICO CAMPO OCULTO) -->
                <div class="form-group">
                    <label for="" class="control-label" hidden>Registro No.</label>
                    <input type="text" readonly="readonly" [(ngModel)]="user.num_clie" name="num_clie" placeholder="No" class="form-control" required hidden>
                </div>                  

                <div class="form-group">
                    <label for="" class="control-label">ID Empresa</label>
                    <input type="number" [(ngModel)]="user.idempresa" name="idempresa" placeholder="DIGITE EL ID EMPRESA" class="form-control" autofocus>
                </div>

                <div class="form-group">
                    <label for="" class="control-label">ID Sucursal</label>
                    <input type="number" [(ngModel)]="user.idsuc" name="idsuc" placeholder="DIGITE EL ID SUCURSAL" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">Identidad</label>
                    <input type="text" [(ngModel)]="user.identidad" name="identidad" placeholder="DIGITE LA IDENTIDAD" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">RTN</label>
                    <input type="text" [(ngModel)]="user.rtn" name="rtn" placeholder="DIGITE EL RTN" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">Fecha Nacimiento</label>
                    <input type="date" [(ngModel)]="user.fecha_nac" name="fecha_nac" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">Nombre</label>
                    <input type="text" [(ngModel)]="user.nombre" name="nombre" placeholder="DIGITE EL NOMBRE" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">Teléfono</label>
                    <input type="text" [(ngModel)]="user.telefono" name="telefono" placeholder="DIGITE EL TELEFONO" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">Dirección</label>
                    <input type="text" [(ngModel)]="user.direccion" name="direccion" placeholder="DIGITE LA DIRECCION" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">Correo</label>
                    <input type="text" [(ngModel)]="user.correo" name="correo" placeholder="DIGITE EL CORREO" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">Fecha Creacion</label>
                    <input type="date" [(ngModel)]="user.fecha_creacion" name="fecha_creacion" placeholder="Seleccione la Fecha" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">Estado</label>
                    <input type="text" [(ngModel)]="user.estado" name="estado" placeholder="Ej: Activo / Inactivo" class="form-control">
                </div>

                <!-- Botón con sus eventos originales intactos -->
                <button class="btn btn-success btn-block" (click)="updateUser()" onclick="javascript:alert('Registro Actualizado')">
                    Actualizar
                </button>    
            </form>
        </div>
    </div>
</div>

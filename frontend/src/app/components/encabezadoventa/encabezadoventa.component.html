<nav class="navbar navbar-dark bg-dark">
    <a href="/" class="navbar-brand">REGISTRO DE ENCABEZADOS DE VENTAS</a>
</nav>

<div class="container">  
    <div class="row mt-25">          
        <table class="table table-bordered table-hover">
            <thead>
                <tr>
                    <th>ID VENTA</th>
                    <th>ID EMPRESA</th>
                    <th>ID SUC</th>
                    <th>ID CLIENTE</th>
                    <th>ID USUARIO</th>
                    <th>ID F. PAGO</th>
                    <th>F. VENTA</th>
                    <th>ESTADO</th>
                    <th>ACCIONES</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let User of TUser">
                    <td>{{User.num_venta}}</td>
                    <td>{{User.idempresa}}</td>
                    <td>{{User.idsuc}}</td>
                    <td>{{User.num_clie}}</td>
                    <td>{{User.userid}}</td>
                    <td>{{User.idfpago}}</td>
                    <td>{{User.fecha_venta}}</td>
                    <td>{{User.estado}}</td>
                    <td style="white-space: nowrap;">  
                        <button class="btn btn-danger btn-sm mx-1">Eliminar</button>
                        <button class="btn btn-success btn-sm mx-1">Actualizar</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

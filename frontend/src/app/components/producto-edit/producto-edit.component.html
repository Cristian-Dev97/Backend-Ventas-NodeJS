<nav class="navbar navbar-dark bg-dark">
    <a href="/" class="navbar-brand">PRODUCTOS</a>
</nav>

<div class="row mt-5">
    <div class="card">
        <div class="card-body">
            <form action="">
                <!-- Primary Key (ÚNICO CAMPO OCULTO) -->
                <div class="form-group">
                    <label for="" class="control-label" hidden>Registro No.</label>
                    <input type="text" readonly="readonly" [(ngModel)]="user.num_prod" name="num_prod" placeholder="No" class="form-control" required hidden>
                </div>                  

                <div class="form-group">
                    <label for="" class="control-label">ID Empresa</label>
                    <input type="number" [(ngModel)]="user.idempresa" name="idempresa" placeholder="DIGITE EL ID EMPRESA" class="form-control" autofocus>
                </div>

                <div class="form-group">
                    <label for="" class="control-label">ID Sucursal</label>
                    <input type="number" [(ngModel)]="user.idsuc" name="idsuc" placeholder="DIGITE EL ID SUCURSAL" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">ID Tipo Producto</label>
                    <input type="number" [(ngModel)]="user.idtpprod" name="idtpprod" placeholder="DIGITE EL ID TIPO PRODUCTO" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">Descripción</label>
                    <input type="text" [(ngModel)]="user.descripcion" name="descripcion" placeholder="DIGITE LA DESCRIPCIÓN" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">Presentación</label>
                    <input type="text" [(ngModel)]="user.presentacion" name="presentacion" placeholder="DIGITE LA PRESENTACIÓN" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">Marca</label>
                    <input type="text" [(ngModel)]="user.marca" name="marca" placeholder="DIGITE LA MARCA" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">Valor</label>
                    <input type="number" [(ngModel)]="user.valor" name="valor" placeholder="DIGITE EL VALOR" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">Precio Venta</label>
                    <input type="number" [(ngModel)]="user.precioventa" name="precioventa" placeholder="DIGITE EL PRECIO DE VENTA" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">Existencia</label>
                    <input type="number" [(ngModel)]="user.existencia" name="existencia" placeholder="DIGITE LA EXISTENCIA" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">Fecha Ingreso</label>
                    <input type="date" [(ngModel)]="user.fecha_ingreso" name="fecha_ingreso" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">Fecha Actualiza</label>
                    <input type="date" [(ngModel)]="user.fecha_actualiza" name="fecha_actualiza" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">Estado</label>
                    <input type="text" [(ngModel)]="user.estado" name="estado" placeholder="Ej: Activo / Inactivo" class="form-control">
                </div>

                <!-- Botón con sus eventos originales intactos -->
                <button class="btn btn-success btn-block" (click)="updateUser()" onclick="javascript:alert('Registro Actualizado')">
                    Actualizar
                </button>    
            </form>
        </div>
    </div>
</div>

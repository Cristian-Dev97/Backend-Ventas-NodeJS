<nav class="navbar navbar-dark bg-dark">
    <a href="/" class="navbar-brand">PROVEEDORES</a>
</nav>

<div class="row mt-5">
    <div class="card">
        <div class="card-body">
            <form #f="ngForm" (ngSubmit)="updateUser()" novalidate>
                
                <!-- Primary Key (ÚNICO CAMPO OCULTO) -->
                <div class="form-group">
                    <input type="text" readonly="readonly" [(ngModel)]="user.idprov" name="idprov" hidden>
                </div>                  

                <!-- idempresa -->
                <div class="form-group">
                    <label class="control-label">ID Empresa</label>
                    <input type="number" [(ngModel)]="user.idempresa" name="idempresa" placeholder="DIGITE EL ID DE LA EMPRESA" class="form-control" autofocus>
                </div>

                <!-- proveedor -->
                <div class="form-group">
                    <label class="control-label">Proveedor</label>
                    <input type="text" [(ngModel)]="user.proveedor" name="proveedor" placeholder="DIGITE EL PROVEEDOR" class="form-control">
                </div>

                <!-- direccion -->
                <div class="form-group">
                    <label class="control-label">Dirección</label>
                    <input type="text" [(ngModel)]="user.direccion" name="direccion" placeholder="DIGITE LA DIRECCIÓN" class="form-control">
                </div>

                <!-- telefono -->
                <div class="form-group">
                    <label class="control-label">Teléfono</label>
                    <input type="text" [(ngModel)]="user.telefono" name="telefono" placeholder="DIGITE EL TELEFONO" class="form-control">
                </div>

                <!-- responsable -->
                <div class="form-group">
                    <label class="control-label">Responsable</label>
                    <input type="text" [(ngModel)]="user.responsable" name="responsable" placeholder="DIGITE EL RESPONSABLE" class="form-control">
                </div>

                <!-- fecha_creacion -->
                <div class="form-group">
                    <label class="control-label">Fecha Creación</label>
                    <input type="date" [(ngModel)]="user.fecha_creacion" name="fecha_creacion" class="form-control">
                </div>

                <!-- observaciones -->
                <div class="form-group">
                    <label class="control-label">Observaciones</label>
                    <textarea [(ngModel)]="user.observaciones" name="observaciones" placeholder="DIGITE LAS OBSERVACIONES" class="form-control" rows="3"></textarea>
                </div>

                <!-- estado -->
                <div class="form-group">
                    <label class="control-label">Estado</label>
                    <input type="text" [(ngModel)]="user.estado" name="estado" placeholder="Ej: Activo / Inactivo" class="form-control">
                </div>

                <button type="submit" class="btn btn-success btn-block" (click)="updateUser()" onclick="javascript:alert('Registro Actualizado')">
                    Actualizar
                </button>    
            </form>
        </div>
    </div>
</div>

<nav class="navbar navbar-dark bg-dark">
    <a href="/" class="navbar-brand">REGISTRO DE PROVEEDORES</a>
</nav>

<div class="container">  
    <div class="row mt-25">          
        <table class="table table-bordered table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>ID EMPRESA</th>
                    <th>PROVEEDOR</th>
                    <th>DIRECCIÓN</th>
                    <th>TÉLEFONO</th>
                    <th>RESPONSABLE</th>
                    <th>FECHA CREACIÓN</th>
                    <th>OBSERVACIONES</th>
                    <th>ESTADO</th>
                    <th>ACCIONES</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let User of TUser">
                    <td>{{User.idprov}}</td>
                    <td>{{User.idempresa}}</td>
                    <td>{{User.proveedor}}</td>
                    <td>{{User.direccion}}</td>
                    <td>{{User.telefono}}</td>
                    <td>{{User.responsable}}</td>
                    <td>{{User.fecha_creacion}}</td>
                    <td>{{User.observaciones}}</td>
                    <td>{{User.estado}}</td>
                    <td>  
                        <button class="btn btn-danger btn-sm mx-1">Eliminar</button>
                        <button class="btn btn-success btn-sm mx-1">Actualizar</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

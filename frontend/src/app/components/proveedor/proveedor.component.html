<nav class="navbar navbar-dark bg-dark">
    <a href="/" class="navbar-brand">REGISTRO DE PROVEEDORES</a>
</nav>

<div class="agregar_contenedor"></div>
<div class="row mt-5">
<div class="card">
    <div class="card-body">
        <form id="formulario" name="formulario" #f="ngForm" (ngSubmit)="AgregarValor()" novalidate >
          
          <!-- Primary Key (idprov) oculto -->
          <div class="form-group">
            <input type="text" readonly="readonly" [(ngModel)]="user.idprov" name="idprov" hidden>
          </div>

          <div class="form-group">
              <label for="" class="control-label">ID Empresa</label>
              <input type="number" [(ngModel)]="user.idempresa" name="idempresa" placeholder="DIGITE EL ID DE LA EMPRESA" class="form-control">
          </div>

          <div class="form-group">
              <label for="" class="control-label">Proveedor</label>
              <input type="text" [(ngModel)]="user.proveedor" name="proveedor" placeholder="DIGITE EL PROVEEDOR" class="form-control" autofocus>
          </div>

          <div class="form-group">
            <label for="" class="control-label">Dirección</label>
            <input type="text" [(ngModel)]="user.direccion" name="direccion" placeholder="DIGITE LA DIRECCIÓN" class="form-control">
          </div>

          <div class="form-group">
            <label for="" class="control-label">Teléfono</label>
            <input type="text" [(ngModel)]="user.telefono" name="telefono" placeholder="DIGITE EL TELÉFONO" class="form-control">
          </div>

          <div class="form-group">
            <label for="" class="control-label">Responsable</label>
            <input type="text" [(ngModel)]="user.responsable" name="responsable" placeholder="DIGITE EL RESPONSABLE" class="form-control">
          </div>

          <div class="form-group">
            <label for="" class="control-label">Fecha Creación</label>
            <input type="date" [(ngModel)]="user.fecha_creacion" name="fecha_creacion" class="form-control">
          </div>

          <div class="form-group">
            <label for="" class="control-label">Observaciones</label>
            <input type="text" [(ngModel)]="user.observaciones" name="observaciones" placeholder="DIGITE LAS OBSERVACIONES" class="form-control">
          </div>

          <div class="form-group">
            <label for="" class="control-label">Estado</label>
            <input type="text" [(ngModel)]="user.estado" name="estado" placeholder="Ej: Activo / Inactivo" class="form-control">
          </div>

          <button type="submit" class="btn btn-primary" formnovalidate value="Save" onclick="javascript:alert('Registro Almacenado')">
              Agregar
          </button>
        </form>
    </div>
</div>
</div>
<br>


<div class="container">  
    <div class="row mt-25">          
        <table class="table table-bordered table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>ID EMPRESA</th>
                    <th>PROVEEDOR</th>
                    <th>DIRECCIÓN</th>
                    <th>TÉLEFONO</th>
                    <th>RESPONSABLE</th>
                    <th>FECHA CREACIÓN</th>
                    <th>OBSERVACIONES</th>
                    <th>ESTADO</th>
                    <th>ACCIONES</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let User of TUser">
                    <td>{{User.idprov}}</td>
                    <td>{{User.idempresa}}</td>
                    <td>{{User.proveedor}}</td>
                    <td>{{User.direccion}}</td>
                    <td>{{User.telefono}}</td>
                    <td>{{User.responsable}}</td>
                    <td>{{User.fecha_creacion}}</td>
                    <td>{{User.observaciones}}</td>
                    <td>{{User.estado}}</td>
                    <td>
                        <button class="btn btn-danger" (click)="EliminarData(User.idprov)" onclick="javascript:alert('Registro Eliminado')">Eliminar</button>
                        <button class="btn btn-success" [routerLink]="['/proveedor/edit', User.idprov]">Actualizar</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

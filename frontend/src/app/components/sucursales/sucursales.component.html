<nav class="navbar navbar-dark bg-dark">
    <!-- Cambiado a Sucursales -->
    <a href="/" class="navbar-brand">REGISTRO DE SUCURSALES</a>
</nav>

<div class="agregar_contenedor"></div>
<div class="row mt-5">
<div class="card">
    <div class="card-body">
        <form id="formulario" name="formulario" #f="ngForm" (ngSubmit)="AgregarValor()" novalidate >
          
          <!-- Campo oculto SOLO para idsuc -->
          <div class="form-group">
            <input type="text" readonly="readonly" [(ngModel)]="user.idsuc" name="idsuc" hidden>
          </div>                  

          <!-- Campo visible para idempresa (para poder ingresar datos) -->
          <div class="form-group">
              <label for="" class="control-label">ID Empresa</label>
              <input type="number" [(ngModel)]="user.idempresa" name="idempresa" placeholder="DIGITE EL ID DE LA EMPRESA" class="form-control" autofocus>
          </div>

          <div class="form-group">
              <label for="" class="control-label">Sucursal</label>
              <input type="text" [(ngModel)]="user.sucursal" name="sucursal" placeholder="DIGITE LA SUCURSAL" class="form-control">
          </div>

          <div class="form-group">
            <label for="" class="control-label">Dirección</label>
            <input type="text" [(ngModel)]="user.dirsuc" name="dirsuc" placeholder="DIGITE LA DIRECCIÓN" class="form-control">
          </div>

          <div class="form-group">
            <label for="" class="control-label">Teléfono</label>
            <input type="text" [(ngModel)]="user.telefono" name="telefono" placeholder="DIGITE EL TELEFONO" class="form-control">
          </div>

          <div class="form-group">
            <label for="" class="control-label">Estado</label>
            <input type="text" [(ngModel)]="user.estado" name="estado" placeholder="Ej: Activo / Inactivo" class="form-control">
          </div>

          <button type="submit" class="btn btn-primary" formnovalidate value="Save" onclick="javascript:alert('Registro Almacenado')">
              Agregar
          </button>
        </form>
    </div>
</div>
</div>
<br>

<div class="container">  
    <div class="row mt-25">          
        <table class="table table-bordered table-hover">
            <thead>
                <tr>
                    <th>ID SUC</th>
                    <th>ID EMPRESA</th>
                    <th>SUCURSAL</th>
                    <th>DIRECCIÓN</th>
                    <th>TELÉFONO</th>
                    <th>ESTADO</th>
                    <th>ACCIONES</th>
                </tr>
            </thead>
            <tbody>
                <!-- El *ngFor se mantiene con TUser, pero ahora accede a las propiedades de sucursales -->
                <tr *ngFor="let User of TUser">
                    <td>{{User.idsuc}}</td>
                    <td>{{User.idempresa}}</td>
                    <td>{{User.sucursal}}</td>
                    <td>{{User.dirsuc}}</td>
                    <td>{{User.telefono}}</td>
                    <td>{{User.estado}}</td>
                    <td>  
                        <button  class="btn btn-danger"  (click)="EliminarData(User.idsuc)" onclick="javascript:alert('Registro Eliminado')" >Eliminar</button> 
                        <button  class="btn btn-success" [routerLink]="['/sucursales/edit', User.idsuc]">Actualizar</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

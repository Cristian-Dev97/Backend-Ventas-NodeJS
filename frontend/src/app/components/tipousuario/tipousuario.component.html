<nav class="navbar navbar-dark bg-dark">
    <a href="/" class="navbar-brand">REGISTRO DE TIPOS DE USUARIO</a>
</nav>

<div class="agregar_contenedor"></div>
<div class="row mt-5">
<div class="card">
    <div class="card-body">
        <form id="formulario" name="formulario" #f="ngForm" (ngSubmit)="AgregarValor()" novalidate >
          <div class="form-group">
            <label for="" class="control-label" hidden>Registro No.</label>
                  <input type="text"  readonly="readonly"  [(ngModel)]="user.idtpusuario" name="idtpusuario" placeholder="No" class="form-control" required hidden>
                  </div>                  

              <div class="form-group">
                  <label for="" class="control-label">ID Empresa</label>
                  <input type="number"  [(ngModel)]="user.idempresa"  name="idempresa" placeholder="DIGITE EL ID EMPRESA"  class="form-control" autofocus>
              </div>
              <div class="form-group">
                <label for="" class="control-label">Tipo</label>
                <input type="text"  [(ngModel)]="user.tipo"  name="tipo" placeholder="DIGITE EL TIPO"  class="form-control" autofocus>
              </div>
              <div class="form-group">
                <label for="" class="control-label">Estado</label>
                <input type="text"  [(ngModel)]="user.estado"  name="estado" placeholder="DIGITE EL ESTADO"  class="form-control" autofocus>
            </div>

          <button type="submit" class="btn btn-primary" formnovalidate value="Save"  onclick="javascript:alert('Registro Almacenado')">
              Agregar
          </button>
        </form>
    </div>
</div>
</div>
<br>

<div class="container">  
    <div class="row mt-25">          
        <table class="table table-bordered table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>ID EMPRESA</th>
                    <th>TIPO</th>
                    <th>ESTADO</th>
                    <th>ACCIONES</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let User of TUser">
                    <td>{{User.idtpusuario}}</td>
                    <td>{{User.idempresa}}</td>
                    <td>{{User.tipo}}</td>
                    <td>{{User.estado}}</td>
                    <td>
                        <button class="btn btn-danger" (click)="EliminarData(User.idtpusuario)" onclick="javascript:alert('Registro Eliminado')">Eliminar</button>
                        <button class="btn btn-success" [routerLink]="['/tipousuario/edit', User.idtpusuario]">Actualizar</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

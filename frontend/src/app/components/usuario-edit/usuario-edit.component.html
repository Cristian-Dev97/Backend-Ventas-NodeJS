<nav class="navbar navbar-dark bg-dark">
    <a href="/" class="navbar-brand">USUARIOS</a>
</nav>

<div class="row mt-5">
    <div class="card">
        <div class="card-body">
            <form action="">
                <!-- Primary Key (ÚNICO CAMPO OCULTO) -->
                <div class="form-group">
                    <label for="" class="control-label" hidden>Registro No.</label>
                    <input type="text" readonly="readonly" [(ngModel)]="user.userid" name="userid" placeholder="No" class="form-control" required hidden>
                </div>                  

                <div class="form-group">
                    <label for="" class="control-label">ID Empresa</label>
                    <input type="number" [(ngModel)]="user.idempresa" name="idempresa" placeholder="DIGITE EL ID EMPRESA" class="form-control" autofocus>
                </div>

                <div class="form-group">
                    <label for="" class="control-label">ID Sucursal</label>
                    <input type="number" [(ngModel)]="user.idsuc" name="idsuc" placeholder="DIGITE EL ID SUCURSAL" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">ID Tipo Usuario</label>
                    <input type="number" [(ngModel)]="user.idtpusuario" name="idtpusuario" placeholder="DIGITE EL ID TIPO USUARIO" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">ID Empleado</label>
                    <input type="number" [(ngModel)]="user.idemp" name="idemp" placeholder="DIGITE EL ID EMPLEADO" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">Usuario</label>
                    <input type="text" [(ngModel)]="user.usuario" name="usuario" placeholder="DIGITE EL USUARIO" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">Clave</label>
                    <input type="text" [(ngModel)]="user.clave" name="clave" placeholder="DIGITE LA CLAVE" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">Tipo</label>
                    <input type="text" [(ngModel)]="user.tipo" name="tipo" placeholder="DIGITE EL TIPO" class="form-control">
                </div>

                <div class="form-group">
                    <label for="" class="control-label">Estado</label>
                    <input type="text" [(ngModel)]="user.estado" name="estado" placeholder="Ej: Activo / Inactivo" class="form-control">
                </div>

                <!-- Botón con sus eventos originales intactos -->
                <button class="btn btn-success btn-block" (click)="updateUser()" onclick="javascript:alert('Registro Actualizado')">
                    Actualizar
                </button>    
            </form>
        </div>
    </div>
</div>
